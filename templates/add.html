{% extends "base.html" %}

{% block content %}
<section class="page-header">
  <div>
    <h1>Add a coffee</h1>
    <p>Capture your latest brew with origin, tasting notes, and brew style.</p>
  </div>
</section>

<section class="card form-card">
  <form method="post" class="coffee-form">
    <div class="form-grid">
      <label>
        Date *
        <input type="date" name="date" required />
      </label>
      <label>
        Rating *
        <select name="rating" required>
          <option value="">Select</option>
          {% for rating in range(1, 6) %}
            <option value="{{ rating }}">{{ rating }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="autocomplete" data-field="brand">
        Brand
        <input type="text" name="brand" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="varietal">
        Varietal
        <input type="text" name="varietal" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="origin_region">
        Origin region
        <input type="text" name="origin_region" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="country">
        Country
        <input type="text" name="country" id="country" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="location">
        Location
        <input type="text" name="location" id="location" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="process">
        Process
        <input type="text" name="process" autocomplete="off" placeholder="washed" />
        <div class="suggestions"></div>
      </label>
      <label class="autocomplete" data-field="flavours">
        Flavours
        <input type="text" name="flavours" placeholder="strawberry, jasmine" autocomplete="off" />
        <div class="suggestions"></div>
      </label>
      <label>
        Grinder
        <select name="grinder" id="grinder-select">
          <option value="">Select</option>
          {% for grinder in grinders %}
            <option value="{{ grinder }}">{{ grinder }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Grind setting
        <select name="grind_setting" id="grind-setting-select">
          <option value="">Select grinder first</option>
        </select>
      </label>
      <label>
        Brew style
        <select name="brew_style">
          <option value="">Select</option>
          {% for style in brew_styles %}
            <option value="{{ style }}">{{ style }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Altitude (m)
        <input type="number" name="altitude_m" min="1" max="9000" id="altitude" />
      </label>
      <label>
        Latitude
        <input type="number" step="0.0001" name="latitude" id="latitude" />
      </label>
      <label>
        Longitude
        <input type="number" step="0.0001" name="longitude" id="longitude" />
      </label>
    </div>

    <div class="map-panel">
      <div class="map-header">
        <div>
          <h3>Pick on map</h3>
          <p>Click to drop a marker and capture coordinates.</p>
        </div>
      </div>
      <div id="add-map" class="map map--compact"></div>
      <div class="maps-link">
        <label>
          Google Maps link
          <input type="url" id="maps-link" placeholder="https://maps.google.com/..." />
        </label>
        <button type="button" class="secondary" id="parse-maps">Parse</button>
        <span id="maps-status" class="helper"></span>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="primary">Save coffee</button>
    </div>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script>
  window.coffeeLogConfig = {
    aergrindSettings: {{ aergrind_settings|tojson }},
    belindaSettings: {{ belinda_settings|tojson }},
  };
</script>
{% endblock %}
