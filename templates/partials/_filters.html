<form class="filters filters-sticky" method="get">
  <div class="filter-grid">
    <label>
      From
      <input type="date" name="date_from" value="{{ request.args.get('date_from', '') }}" />
    </label>
    <label>
      To
      <input type="date" name="date_to" value="{{ request.args.get('date_to', '') }}" />
    </label>
    <label>
      Brand
      <select name="brand">
        <option value="">All</option>
        {% for value in distinct_values.brand %}
          <option value="{{ value }}" {% if request.args.get('brand') == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Varietal
      <select name="varietal">
        <option value="">All</option>
        {% for value in distinct_values.varietal %}
          <option value="{{ value }}" {% if request.args.get('varietal') == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Country
      <select name="country">
        <option value="">All</option>
        {% for value in distinct_values.country %}
          <option value="{{ value }}" {% if request.args.get('country') == value %}selected{% endif %}>{{ value|flag_country }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Process
      <select name="process">
        <option value="">All</option>
        {% for value in distinct_values.process %}
          <option value="{{ value }}" {% if request.args.get('process') == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Brew style
      <select name="brew_style">
        <option value="">All</option>
        {% for value in distinct_values.brew_style %}
          <option value="{{ value }}" {% if request.args.get('brew_style') == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Min rating
      <select name="min_rating">
        <option value="">Any</option>
        {% for rating in range(1, 6) %}
          <option value="{{ rating }}" {% if request.args.get('min_rating') == rating|string %}selected{% endif %}>{{ rating }}+</option>
        {% endfor %}
      </select>
    </label>
  </div>
  <div class="filter-actions">
    <button type="submit" class="primary">Apply filters</button>
    <a href="{{ request.path }}" class="secondary">Reset</a>
  </div>
</form>
